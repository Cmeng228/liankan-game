<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>连连看</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="游戏状态">
      <div class="stats">
        <div class="stat"><span>时间</span><strong id="time">03:00</strong></div>
        <div class="stat"><span>分数</span><strong id="score">0</strong></div>
        <div class="stat"><span>连击</span><strong id="combo">0</strong></div>
        <div class="stat"><span>步数</span><strong id="moves">0</strong></div>
        <div class="stat"><span>剩余</span><strong id="left">150</strong></div>
      </div>
    </section>

    <section class="leaderboard" aria-label="排行榜">
      <div class="leaderboard-head">
        <strong>排行榜前三</strong>
        <button id="showAllScores" type="button">查看全部排行榜</button>
      </div>
      <ol id="topScores" class="score-list"></ol>
    </section>

    <section class="game-shell">
      <aside class="panel">
        <div class="player-card">
          <span>玩家</span>
          <strong id="playerName">未填写</strong>
        </div>
        <button id="startGame" class="primary" disabled>开始游戏</button>
        <button id="newGame">新局</button>
        <div class="message" id="message">先填写游戏名字。</div>
      </aside>

      <div class="board-wrap">
        <canvas id="lineLayer" aria-hidden="true"></canvas>
        <div id="board" class="board" aria-label="连连看棋盘"></div>
      </div>
    </section>
  </main>

  <div id="nameModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="nameTitle">
    <form id="nameForm" class="modal-card">
      <h2 id="nameTitle">先取个游戏名字</h2>
      <input id="nameInput" name="name" maxlength="16" autocomplete="nickname" placeholder="输入你的名字" required>
      <button class="primary" type="submit">保存名字</button>
    </form>
  </div>

  <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="modal-card result-card">
      <h2 id="resultTitle">游戏结束</h2>
      <strong id="finalScore" class="final-score">0 分</strong>
      <p id="resultTaunt"></p>
      <button id="playAgain" class="primary" type="button">再来一局</button>
    </div>
  </div>

  <div id="allScoresModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="allScoresTitle">
    <div class="modal-card scores-card">
      <h2 id="allScoresTitle">全部排行榜</h2>
      <ol id="allScores" class="score-list full"></ol>
      <button id="closeScores" class="primary" type="button">关闭</button>
    </div>
  </div>

  <script src="./game.js"></script>
</body>
</html>
